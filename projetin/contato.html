<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contato.css">
    <title>Plataforma TechCursos</title>
</head>

<body>
    <header id="topo-site">
        <h1 class="titulo-principal">Plataforma TechCursos</h1>
        <p class="subtitulo">
            Aprenda tecnologia de modo prático e acessível, do nível introdutório ao avançado.
        </p>
    </header>

    <nav class="menu-principal">
        <ul class="lista-menu">
            <li><a href="index.html">Início</a></li>
            <li><a href="#">Cursos</a></li>
            <li><a href="#">Trilhas</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <form>
                <div>
                    <label for="nome">Nome Completo:</label>
                    <br>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu Nome Completo..." required>
                </div>

                <div>
                    <label for="email">E-mail:</label>
                    <br>
                    <input type="email" id="email" name="email" placeholder="Digite seu Email aqui..." required>
                </div>
                <br>

                <div>
                    <label for="assunto">Assunto:</label>
                    <br>
                    <select id="assunto" name="assunto">
                        <option value="">Selecione uma Opção</option>
                        <option value="duvida">Dúvida sobre o curso</option>
                        <option value="suporte">Suporte técnica</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>
                <br>

                <div>
                    <label for="mensagem">Mensagem:</label>
                    <br>
                    <textarea name="mensagem" id="mensagem" cols="30" rows="5"
                        placeholder="Escreva aqui...">Escreva sua Mensagem...</textarea>
                </div>

                <div>
                    <button type="submit">Enviar Mensagem</button>
                </div>
                <br>
            </form>
        </section>
    </main>

    <footer id="rodape-site">
        <p>&copy; 2026 TechCursos. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
